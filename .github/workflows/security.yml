# レベル2セキュリティ: 第2層（CI上の品質ゲート）
# すべて無料ツールで構成。基準を満たさないPRのマージを自動でブロックする。
#
# 言語非依存。Trivy / OSV-Scanner / Semgrep / TruffleHog が言語・エコシステムを
# 自動判定する。pip-audit(Python) / composer-audit(PHP) は言語専用の任意ジョブで、
# 対象ファイルが無ければ「検出ステップ＋ステップレベル if」でスキップされる。
#
# ※重要: ジョブレベルの `if:` では hashFiles() を使えない（context availability の制約で
#   ワークフロー全体が検証エラーになる）。言語判定は必ず steps 内の検出ステップで行うこと。
#   変更時は actionlint で検証する（.github/workflows/actionlint.yml / pre-commit）。
#
# 対応カテゴリ:
#   1. シークレットスキャン     -> TruffleHog（検証機能つき・言語非依存）
#   2. SCA（脆弱性スキャン）    -> Trivy + OSV-Scanner（多言語）/ pip-audit(Python) / composer-audit(PHP)
#   3. SCA（slopsquatting）    -> OSV-Scanner（補助）/ ※Socket GitHub App は別途有効化
#   4. SAST（汎用）            -> Semgrep OSS CLI（言語自動判定）
#   5. SAST（AI生成コード特化） -> Semgrep AI Security + Shadow AI ルール
#   6. ライセンススキャン       -> Trivy（license スキャナ・多言語）
#   8. DAST                    -> 別ワークフロー（dast-zap.yml）で実行
#
# ▼ 段階導入トグル（既存PJ配慮）: リポジトリ変数 SECURITY_GATE_MODE ▼
#   - 未設定 or "block"（既定）: findings があればジョブを赤にする＝品質ゲート。
#   - "report": findings があってもジョブは緑（助言モード）。SARIF/artifact は出る。
#   既存プロジェクトは "report" で導入→既存指摘を棚卸し→"block" に切替→ブランチ保護で Required、
#   の順で段階導入する（詳細: docs/security/LEVEL2_SECURITY.md）。
#   ※ 秘密情報スキャン（TruffleHog）はモードに関わらず常に block（新規の漏洩は赦さない）。
#   設定: Settings → Secrets and variables → Actions → Variables → New variable
#         Name=SECURITY_GATE_MODE / Value=report（または block）
name: Security (Level 2)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # SARIF を Code Scanning にアップロードするため

jobs:
  # --- カテゴリ1: シークレットスキャン（TruffleHog OSS / 無料） ---
  secrets:
    name: Secrets - TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # git履歴全体をスキャンするため
      - name: TruffleHog（検証つきスキャン）
        uses: trufflesecurity/trufflehog@f2cd191b97098913a07522227d2b5e40e57252f4 # main
        with:
          extra_args: --only-verified   # "現在も有効な"シークレットだけで失敗させる

  # --- カテゴリ4+5: SAST（汎用 + AI生成コード特化）Semgrep OSS / 無料 ---
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Semgrep scan（無料レジストリルール・言語自動判定）
        # report モードでは findings があっても赤にしない（助言モード）
        continue-on-error: ${{ vars.SECURITY_GATE_MODE == 'report' }}
        run: |
          # p/default はリポジトリ内の言語をSemgrepが自動判定して該当ルールを適用する。
          # 特定言語に寄せたい場合のみ p/python, p/javascript, p/golang 等を追加する。
          semgrep scan \
            --config p/default \
            --config p/security-audit \
            --config p/secrets \
            --config p/dockerfile \
            --config p/ci \
            --sarif --output semgrep.sarif \
            --error
          # --- カテゴリ5: AI生成コード特化（無料パック） ---
          # 記事の "AI Security"(27) / "Shadow AI"(186) ルールに相当。
          # 公式レジストリでのパック名は導入時に最新を確認すること:
          #   https://semgrep.dev/explore
          # 例（要確認）:
          #   --config p/ai-security  --config p/shadow-ai
      - name: SARIF を Code Scanning にアップロード
        if: always()
        continue-on-error: true   # private+GHAS無効だと不可。証跡は下の artifact で確保
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
        with:
          sarif_file: semgrep.sarif
      # 証跡: SARIF をダウンロード可能な成果物としても残す（private+GHAS無しでも証跡になる）
      - name: SAST結果を成果物として保存
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sast-semgrep-sarif
          path: semgrep.sarif

  # --- カテゴリ2+6: SCA（脆弱性）+ ライセンススキャン（Trivy / 無料） ---
  sca-trivy:
    name: SCA + License - Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # 品質ゲート: CRITICAL/HIGH があれば失敗（マージブロック）
      - name: Trivy（脆弱性 + ライセンス・ゲート）
        continue-on-error: ${{ vars.SECURITY_GATE_MODE == 'report' }}
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scanners: vuln,license,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: '1'        # CRITICAL/HIGH があればマージブロック（report モードでは緑のまま）
          ignore-unfixed: true

      # --- 以下は証跡（顧客説明用の成果物）。スキャンは失敗させない ---
      - name: Trivy SARIF（Code Scanning用）
        if: always()
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy.sarif
          exit-code: '0'
      - name: Trivy SARIF を Code Scanning にアップロード
        if: always()
        continue-on-error: true   # private+GHAS無効だと不可。証跡は下の artifact で確保
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
        with:
          sarif_file: trivy.sarif
      - name: SBOM（CycloneDX）を生成
        if: always()
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: '0'
      - name: ライセンスレポートを生成
        if: always()
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          scan-type: fs
          scanners: license
          format: table
          output: license-report.txt
          exit-code: '0'
      - name: SCA証跡（SBOM・ライセンス・SARIF）を成果物として保存
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sca-evidence
          path: |
            sbom.cdx.json
            license-report.txt
            trivy.sarif

  # --- カテゴリ2: SCA（Python専用・任意）pip-audit / 無料 ---
  # Pythonプロジェクト向けの追加層。requirements*.txt が無ければ自動スキップされる。
  # 多言語のSCAは上の Trivy / OSV-Scanner が担うため、非Pythonでは不要。
  pip-audit:
    name: SCA - pip-audit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # ジョブレベル if で hashFiles() は使えないため、検出ステップ＋ステップ if で分岐する
      - name: requirements の有無を判定
        id: detect
        run: |
          if [ -n "$(find . -name 'requirements*.txt' \
              -not -path './.git/*' -not -path './vendor/*' -not -path './node_modules/*' \
              -print -quit)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: setup-python
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'
      - name: pip-audit
        if: steps.detect.outputs.found == 'true'
        continue-on-error: ${{ vars.SECURITY_GATE_MODE == 'report' }}
        run: |
          pip install pip-audit
          status=0
          while IFS= read -r -d '' f; do
            echo "::group::pip-audit $f"
            pip-audit -r "$f" || status=1
            echo "::endgroup::"
          done < <(find . -name 'requirements*.txt' -not -path './.git/*' -print0)
          exit $status

  # --- カテゴリ3: SCA（slopsquatting補助）OSV-Scanner / 無料 ---
  # ※ 振る舞い分析による本命の slopsquatting 対策は Socket GitHub App（OSS無料枠）。
  #    OSV-Scanner は既知の悪性パッケージ・脆弱性アドバイザリの照合を担う補助層。
  osv:
    name: SCA - OSV-Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # 主要言語の lockfile を広くカバー（Python/Node/Go/Rust/Ruby/Java/PHP 等）。
      # ジョブレベル if で hashFiles() は使えないため、検出ステップ＋ステップ if で分岐する。
      - name: lockfile の有無を判定
        id: detect
        run: |
          if [ -n "$(find . \( \
              -name 'requirements*.txt' -o -name poetry.lock -o -name Pipfile.lock \
              -o -name package-lock.json -o -name yarn.lock -o -name pnpm-lock.yaml \
              -o -name go.sum -o -name Cargo.lock -o -name Gemfile.lock \
              -o -name composer.lock -o -name gradle.lockfile -o -name pom.xml \
            \) -not -path './.git/*' -not -path './vendor/*' -not -path './node_modules/*' \
            -print -quit)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: OSV-Scanner
        if: steps.detect.outputs.found == 'true'
        continue-on-error: ${{ vars.SECURITY_GATE_MODE == 'report' }}
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

  # --- カテゴリ2: SCA（PHP専用・任意）composer audit / 無料 ---
  # composer.lock があれば実行。CI で composer install しないため --locked で lock を直接監査する。
  composer-audit:
    name: SCA - composer audit (PHP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: composer.lock の有無を判定
        id: detect
        run: |
          if [ -n "$(find . -name composer.lock \
              -not -path './vendor/*' -not -path './.git/*' -print -quit)" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: PHP をセットアップ
        if: steps.detect.outputs.found == 'true'
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          tools: composer
      - name: composer audit（lock を直接監査）
        if: steps.detect.outputs.found == 'true'
        continue-on-error: ${{ vars.SECURITY_GATE_MODE == 'report' }}
        run: composer audit --locked --no-interaction

# レベル2セキュリティ: 第2層（CI上の品質ゲート）
# すべて無料ツールで構成。基準を満たさないPRのマージを自動でブロックする。
#
# 言語非依存。Trivy / OSV-Scanner / Semgrep / TruffleHog が言語・エコシステムを
# 自動判定する。pip-audit のみ Python 専用の任意ジョブで、requirements*.txt が
# 無いプロジェクトでは自動でスキップされる。
#
# 対応カテゴリ:
#   1. シークレットスキャン     -> TruffleHog（検証機能つき・言語非依存）
#   2. SCA（脆弱性スキャン）    -> Trivy + OSV-Scanner（多言語）/ pip-audit（Python任意）
#   3. SCA（slopsquatting）    -> OSV-Scanner（補助）/ ※Socket GitHub App は別途有効化
#   4. SAST（汎用）            -> Semgrep OSS CLI（言語自動判定）
#   5. SAST（AI生成コード特化） -> Semgrep AI Security + Shadow AI ルール
#   6. ライセンススキャン       -> Trivy（license スキャナ・多言語）
#   8. DAST                    -> 別ワークフロー（dast-zap.yml）で実行
name: Security (Level 2)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # SARIF を Code Scanning にアップロードするため

jobs:
  # --- カテゴリ1: シークレットスキャン（TruffleHog OSS / 無料） ---
  secrets:
    name: Secrets - TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git履歴全体をスキャンするため
      - name: TruffleHog（検証つきスキャン）
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified   # "現在も有効な"シークレットだけで失敗させる

  # --- カテゴリ4+5: SAST（汎用 + AI生成コード特化）Semgrep OSS / 無料 ---
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan（無料レジストリルール・言語自動判定）
        run: |
          # p/default はリポジトリ内の言語をSemgrepが自動判定して該当ルールを適用する。
          # 特定言語に寄せたい場合のみ p/python, p/javascript, p/golang 等を追加する。
          semgrep scan \
            --config p/default \
            --config p/security-audit \
            --config p/secrets \
            --config p/dockerfile \
            --config p/ci \
            --sarif --output semgrep.sarif \
            --error
          # --- カテゴリ5: AI生成コード特化（無料パック） ---
          # 記事の "AI Security"(27) / "Shadow AI"(186) ルールに相当。
          # 公式レジストリでのパック名は導入時に最新を確認すること:
          #   https://semgrep.dev/explore
          # 例（要確認）:
          #   --config p/ai-security  --config p/shadow-ai
      - name: SARIF を Code Scanning にアップロード
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
      # 証跡: SARIF をダウンロード可能な成果物としても残す（private+GHAS無しでも証跡になる）
      - name: SAST結果を成果物として保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-semgrep-sarif
          path: semgrep.sarif

  # --- カテゴリ2+6: SCA（脆弱性）+ ライセンススキャン（Trivy / 無料） ---
  sca-trivy:
    name: SCA + License - Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 品質ゲート: CRITICAL/HIGH があれば失敗（マージブロック）
      - name: Trivy（脆弱性 + ライセンス・ゲート）
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,license,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: '1'        # CRITICAL/HIGH があればマージブロック
          ignore-unfixed: true

      # --- 以下は証跡（顧客説明用の成果物）。スキャンは失敗させない ---
      - name: Trivy SARIF（Code Scanning用）
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy.sarif
          exit-code: '0'
      - name: Trivy SARIF を Code Scanning にアップロード
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
      - name: SBOM（CycloneDX）を生成
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: '0'
      - name: ライセンスレポートを生成
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: license
          format: table
          output: license-report.txt
          exit-code: '0'
      - name: SCA証跡（SBOM・ライセンス・SARIF）を成果物として保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-evidence
          path: |
            sbom.cdx.json
            license-report.txt
            trivy.sarif

  # --- カテゴリ2: SCA（Python専用・任意）pip-audit / 無料 ---
  # Pythonプロジェクト向けの追加層。requirements*.txt が無ければ自動スキップされる。
  # 多言語のSCAは上の Trivy / OSV-Scanner が担うため、非Pythonでは不要。
  pip-audit:
    name: SCA - pip-audit (Python)
    runs-on: ubuntu-latest
    if: hashFiles('**/requirements*.txt') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: pip-audit
        run: |
          pip install pip-audit
          for f in $(find . -name 'requirements*.txt' -not -path './.git/*'); do
            echo "::group::pip-audit $f"
            pip-audit -r "$f" || exit 1
            echo "::endgroup::"
          done

  # --- カテゴリ3: SCA（slopsquatting補助）OSV-Scanner / 無料 ---
  # ※ 振る舞い分析による本命の slopsquatting 対策は Socket GitHub App（OSS無料枠）。
  #    OSV-Scanner は既知の悪性パッケージ・脆弱性アドバイザリの照合を担う補助層。
  osv:
    name: SCA - OSV-Scanner
    runs-on: ubuntu-latest
    # 主要言語の lockfile を広くカバー（Python/Node/Go/Rust/Ruby/Java/PHP 等）。
    if: hashFiles('**/requirements*.txt', '**/poetry.lock', '**/Pipfile.lock', '**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml', '**/go.sum', '**/Cargo.lock', '**/Gemfile.lock', '**/composer.lock', '**/gradle.lockfile', '**/pom.xml') != ''
    steps:
      - uses: actions/checkout@v4
      - name: OSV-Scanner
        uses: google/osv-scanner-action@v1.9.1
        with:
          scan-args: |-
            --recursive
            ./

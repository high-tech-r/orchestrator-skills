# =============================================================================
# Dependabot 設定（このフレームワークリポジトリ *自身* 用）
# =============================================================================
# スコープは github-actions のみに限定する。
#   - 目的: ワークフローの `uses:` を SHA ピン留めしているため（サプライチェーン対策）、
#     アクション側のセキュリティ修正を取りこぼさないよう SHA を自動追従更新する。
#   - 言語エコシステム（pip/npm 等）や docker は *あえて付けない*。このリポジトリは
#     markdown スキル中心で追跡すべき本番依存を持たず、PR ノイズを避けるため。
#     （対象プロジェクト向けの言語テンプレは templates/dependabot.yml を参照）
#
# 注意: labels は事前に存在するものだけ指定する（未作成ラベルはエラーになる）。
#       このリポジトリには "actions" ラベルのみ存在するためそれを使う。
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "actions"

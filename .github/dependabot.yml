# カテゴリ2: SCA（脆弱性スキャン）— Dependabot（GitHub利用者は無料）
# 既知のCVEを持つ依存パッケージを検出し、自動でバージョンアップPRを作成する。
# 別途リポジトリ設定で "Dependabot alerts" / "Dependabot security updates" を有効化すること。
version: 2
updates:
  # Python（生成プロジェクトの本番・開発依存）
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"

  # GitHub Actions 自体の依存も更新対象にする
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # コンテナ（生成プロジェクトの Dockerfile）
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

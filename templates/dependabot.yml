# カテゴリ2: SCA（脆弱性スキャン）— Dependabot（GitHub利用者は無料）
# 既知のCVEを持つ依存パッケージを検出し、自動でバージョンアップPRを作成する。
# 別途リポジトリ設定で "Dependabot alerts" / "Dependabot security updates" を有効化すること。
#
# ============================================================================
# ▼ これは対象プロジェクト向けテンプレート（言語・docker 用）です ▼
#   このテンプレート自体はこのリポジトリでは動作しません。使うには、このファイルを
#   **自分のリポジトリの .github/dependabot.yml** にコピーしてください。
#
#   なお、このフレームワークリポジトリ自身は github-actions 限定の
#   .github/dependabot.yml を別途持ちます（ワークフローの SHA ピン留めを追従更新する
#   ためだけの最小構成。言語・docker はノイズ回避のため付けていません）。
#
#   注意: labels で指定しているラベル（dependencies / ci / docker 等）は、
#   事前に GitHub の Issues → Labels で作成しておくこと。
#   作成しない場合は各 updates 項目の labels 行を削除すること
#   （存在しないラベルを指定するとエラーになります）。
# ============================================================================
#
# ▼ 言語非依存テンプレート ▼
#   GitHub Actions と Docker（多くのプロジェクトで共通）のみ既定で有効。
#   プロジェクトの言語に合わせて、該当する package-ecosystem のコメントを外すこと。
version: 2
updates:
  # GitHub Actions 自体の依存（言語を問わず常に対象）
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # コンテナ（Dockerfile がある場合）
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"

  # --- 以下はプロジェクトの言語に合わせて有効化する ---
  # Python（requirements*.txt / poetry / Pipfile）
  # - package-ecosystem: "pip"
  #   directory: "/"
  #   schedule: { interval: "weekly" }
  #   labels: ["dependencies", "security"]
  #
  # Node.js（package.json）
  # - package-ecosystem: "npm"
  #   directory: "/"
  #   schedule: { interval: "weekly" }
  #   labels: ["dependencies", "security"]
  #
  # Go（go.mod）       -> "gomod"
  # Rust（Cargo.toml） -> "cargo"
  # Ruby（Gemfile）    -> "bundler"
  # Java（Maven）      -> "maven"  /  Gradle -> "gradle"
  # PHP（composer）    -> "composer"
  # .NET（nuget）      -> "nuget"
